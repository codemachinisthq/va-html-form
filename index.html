<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 15px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input,
        select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .submit-btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .section-title {
            margin-top: 15px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            color: var(--tg-theme-hint-color, #777);
        }
    </style>
</head>

<body>

    <form id="bookingForm">
        <div class="form-group">
            <label>Date *</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>Adults *</label>
            <input type="number" id="adult" min="1" value="1" required oninput="calcVisitors()">
        </div>
        <div class="form-group">
            <label>Children (Optional)</label>
            <input type="number" id="children" min="0" value="0" oninput="calcVisitors()">
        </div>
        <div class="form-group">
            <label>Total Visitors (Calculated)</label>
            <input type="number" id="visitorNum" readonly style="background:#eee;">
        </div>
        <div class="form-group">
            <label>Visit Type *</label>
            <select id="visitType" required>
                <option value="admission">Admission</option>
                <option value="guided">Guided</option>
            </select>
        </div>
        <div class="form-group">
            <label>Preferred Time *</label>
            <input type="time" id="preferredTime" required>
        </div>

        <div class="section-title">Personal Details (Optional)</div>
        <div class="form-group"><label>Name</label><input type="text" id="name"></div>
        <div class="form-group"><label>Surname</label><input type="text" id="surname"></div>
        <div class="form-group">
            <label>Sex</label>
            <select id="sex">
                <option value="">Select...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <div class="form-group"><label>Country</label><input type="text" id="country"></div>
        <div class="form-group"><label>City</label><input type="text" id="city"></div>
        <div class="form-group"><label>Birth Date</label><input type="date" id="birth_date"></div>
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Mobile</label><input type="tel" id="mobile"></div>
        <div class="form-group"><label>Language</label><input type="text" id="lang"></div>

        <button type="button" class="submit-btn" onclick="submitForm()">Submit Booking</button>
    </form>

    <script>
        // Tell Telegram the WebApp is ready
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens it in full height

        function calcVisitors() {
            const adults = parseInt(document.getElementById('adult').value) || 0;
            const children = parseInt(document.getElementById('children').value) || 0;
            document.getElementById('visitorNum').value = adults + children;
        }
        // Run once on load
        calcVisitors();

        function submitForm() {
            const form = document.getElementById('bookingForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Map all UI elements to a structured data object
            const formData = {
                date: document.getElementById('date').value,
                adult: document.getElementById('adult').value,
                children: document.getElementById('children').value || "0",
                visitorNum: document.getElementById('visitorNum').value,
                visitType: document.getElementById('visitType').value,
                preferredTime: document.getElementById('preferredTime').value,
                name: document.getElementById('name').value || "",
                surname: document.getElementById('surname').value || "",
                sex: document.getElementById('sex').value || "",
                country: document.getElementById('country').value || "",
                city: document.getElementById('city').value || "",
                birth_date: document.getElementById('birth_date').value || "",
                email: document.getElementById('email').value || "",
                mobile: document.getElementById('mobile').value || "",
                lang: document.getElementById('lang').value || ""
            };
            // This magic line sends data back to your Python backend!
            tg.sendData(JSON.stringify(formData));
            tg.close();
        }
    </script>
</body>

</html>
